<!DOCTYPE html>

<title>洋栖中学 - 校园秩序</title>
<style>
    /* ========== 以下是全局通用样式（完全复用，不修改） ========== */
    body {
        margin: 0;
        padding: 0;
        font-family: "宋体", SimSun, Arial, sans-serif;
        font-size: 14px;
        background: linear-gradient(to bottom, #f9f6e8, #ffffff);
        background-attachment: fixed;
        color: #333333;
    }
    .container {
        width: 980px;
        margin: 0 auto;
        border: 1px solid #cccccc;
        box-shadow: 0 0 5px #eeeeee;
        background-color: white;
    }
    .header {
        padding: 20px;
        text-align: center;
        background: linear-gradient(to right, #4a7ba7, #6fa8d1);
        color: white;
        border-bottom: 3px solid #c0392b;
        position: relative;
    }
    .header h1 {
        font-size: 36px;
        text-shadow: 2px 2px 3px #333;
        margin: 0;
    }
    .header p {
        font-size: 16px;
        margin: 10px 0 0 0;
        font-style: italic;
    }
    /* 搜索栏样式（通用） */
    .search-box {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .search-input {
        width: 180px;
        height: 24px;
        border: 1px solid #999;
        padding: 2px 5px;
        font-family: "宋体", SimSun;
        font-size: 13px;
        background-color: #fefefe;
    }
    .search-btn {
        height: 28px;
        padding: 0 10px;
        border: 1px solid #666;
        background: linear-gradient(to bottom, #eaeaea, #cccccc);
        font-family: "宋体", SimSun;
        font-size: 13px;
        cursor: pointer;
    }
    .search-btn:hover {
        background: linear-gradient(to bottom, #dddddd, #bbbbbb);
    }
    /* 搜索结果区（通用） */
    .search-result {
        width: 940px;
        margin: 10px auto;
        padding: 10px;
        border: 1px dashed #c0392b;
        background-color: #fef9e7;
        font-family: "宋体", SimSun;
        font-size: 14px;
        display: none;
    }
    .search-result a {
        color: #0000ee;
        text-decoration: underline;
    }
    .search-result a:hover {
        color: #dd0000;
    }
    /* 导航栏（通用） */
    .nav {
        background-color: #333;
        height: 40px;
        line-height: 40px;
        padding: 0 20px;
    }
    .nav a {
        color: white;
        text-decoration: none;
        margin-right: 25px;
        font-size: 15px;
    }
    .nav a:hover {
        color: #ffd700;
        text-decoration: underline;
    }
    /* 当前页高亮（通用） */
    .nav a.active {
        color: #ffd700;
        font-weight: bold;
        text-decoration: underline;
    }
    /* 内容区基础样式（通用） */
    .content {
        padding: 20px;
    }
    /* 栏目标题样式（通用） */
    .content-title {
        color: #4a7ba7;
        border-bottom: 2px solid #eeeeee;
        padding-bottom: 10px;
        margin-bottom: 20px;
        font-size: 22px;
    }
    /* 信息模块样式（通用） */
    .info-box {
        background-color: #f5f5f5;
        padding: 15px;
        border: 1px solid #dddddd;
        box-shadow: 2px 2px 3px #eeeeee;
        margin-bottom: 20px;
    }
    .info-box h3 {
        color: #c0392b;
        border-bottom: 1px dashed #cccccc;
        padding-bottom: 5px;
        margin-top: 0;
    }
    /* 表格样式（通用，如需表格时用） */
    .common-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }
    .common-table th {
        background: linear-gradient(to bottom, #eaeaea, #cccccc);
        padding: 10px;
        border: 1px solid #999;
        font-size: 15px;
        color: #333;
        text-align: center;
    }
    .common-table td {
        padding: 12px;
        border: 1px solid #dddddd;
        vertical-align: middle;
    }
    /* 底部（通用） */
    .footer {
        background-color: #333;
        color: #cccccc;
        text-align: center;
        padding: 15px;
        font-size: 12px;
        border-top: 3px solid #c0392b;
    }
    .footer p {
        margin: 5px 0;
    }
    /* ========== 以上是全局通用样式（不修改） ========== */
    /* 【新增自定义样式】PDF容器样式，让PDF占满内容区，间距合理 */
    .pdf-wrapper {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 30px; /* 两个PDF之间的间距 */
    }
    .pdf-box {
        width: 100%;
    }
    .pdf-box h3 {
        color: #4a7ba7;
        font-size: 18px;
        margin: 0 0 10px 0;
        padding-bottom: 5px;
        border-bottom: 1px solid #eee;
    }
</style>
<body>
    <div class="container">
        <!-- 头部（通用，不修改） -->
        <div class="header">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索...">
                <button class="search-btn" id="searchBtn">搜索</button>
            </div>
            <h1>洋栖中学</h1>
            <p>博学笃行 · 明德致远</p>
        </div>
        <!-- 搜索结果区（通用，不修改） -->
        <div class="search-result" id="searchResult"></div>
        <!-- 导航栏（【需自定义】只给当前页加active） -->
        <div class="nav">
            <a href="yangqi.html">首页</a>
            <a href="yangqi-intro.html">学校简介</a>
            <a href="yangqi-teacher.html">师资力量</a>
            <a href="#">教学成果</a>
            <a href="yangqi-rule.html"class="active">校园秩序</a>
            <a href="yangqi-math.html">数学天地</a>
            <!-- 如需新增导航项，按格式加在这里 -->
        </div>
        <!-- 核心内容区（【需自定义】替换成当前栏目的内容） -->
        <div class="content">
            <h2 class="content-title">校园规章制度</h2>
            <p class="intro-text">为维护校园正常秩序，保障学生学习生活有序进行，现将学校官方规章制度及学生手册公示如下，全体师生须严格遵照执行。</p>
            
            <div class="pdf-wrapper">
                <div class="pdf-box">
                    <h3>校园概况手册</h3>
                    <!-- 【修改】设置embed宽100%，高700px，适配页面且显示清晰 -->
                    <embed src="学校ing.pdf" type="application/pdf" width="100%" height="700px">
                </div>
                <div class="pdf-box">
                    <h3>学生管理手册</h3>
                    <!-- 【修改】设置embed宽100%，高700px，和上方保持一致 -->
                    <embed src="学生手册.pdf" type="application/pdf" width="100%" height="700px">
                </div>
            </div>
        </div>
        <!-- 底部（通用，不修改） -->
        <div class="footer">
            <p>版权所有 © 1988-2008 洋栖中学 保留所有权利</p>
            <p>技术支持：洋栖中学信息技术组</p>
        </div>
    </div>
    <!-- 解谜搜索逻辑（通用，不修改） -->
    <script src="puzzle-keywords.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResult = document.getElementById('searchResult');
        function doSearch() {
            const keyword = searchInput.value.trim().toLowerCase();
            searchInput.value = '';
            searchResult.style.display = 'none';
            if (!keyword) {
                searchResult.innerHTML = '请输入搜索关键词！';
                searchResult.style.display = 'block';
                return;
            }
            let matchedUrl = '';
            let matchedKey = '';
            for (const key in puzzleKeywords) {
                if (key.toLowerCase() === keyword) {
                    matchedUrl = puzzleKeywords[key];
                    matchedKey = key;
                    break;
                }
            }
            if (matchedUrl) {
                searchResult.innerHTML = `搜索结果：<a href="${matchedUrl}" target="_blank">${matchedKey}</a>`;
            } else {
                searchResult.innerHTML = '未找到相关结果，请尝试其他关键词。';
            }
            searchResult.style.display = 'block';
        }
        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        });
    </script>
</body>
</html>
