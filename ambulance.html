<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消防疏散图 - 洋栖中学</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "宋体", SimSun, Arial, sans-serif;
        font-size: 14px;
        background: linear-gradient(to bottom, #f9f6e8, #ffffff);
        background-attachment: fixed;
        color: #333333;
    }
    .container {
        width: 980px;
        margin: 0 auto;
        border: 1px solid #cccccc;
        box-shadow: 0 0 5px #eeeeee;
        background-color: white;
    }
    .header {
        padding: 20px;
        text-align: center;
        background: linear-gradient(to right, #4a7ba7, #6fa8d1);
        color: white;
        border-bottom: 3px solid #c0392b;
        position: relative;
    }
    .header h1 {
        font-size: 36px;
        text-shadow: 2px 2px 3px #333;
        margin: 0;
    }
    .header p {
        font-size: 16px;
        margin: 10px 0 0 0;
        font-style: italic;
    }
    /* 统一古早搜索框样式 */
    .search-box {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .search-input {
        width: 180px;
        height: 24px;
        border: 1px solid #999;
        padding: 2px 5px;
        font-family: "宋体", SimSun;
        font-size: 13px;
        background-color: #fefefe;
    }
    .search-btn {
        height: 28px;
        padding: 0 10px;
        border: 1px solid #666;
        background: linear-gradient(to bottom, #eaeaea, #cccccc);
        font-family: "宋体", SimSun;
        font-size: 13px;
        cursor: pointer;
    }
    .search-btn:hover {
        background: linear-gradient(to bottom, #dddddd, #bbbbbb);
    }
    /* 搜索结果区样式 */
    .search-result {
        width: 940px;
        margin: 10px auto;
        padding: 10px;
        border: 1px dashed #c0392b;
        background-color: #fef9e7;
        font-family: "宋体", SimSun;
        font-size: 14px;
        display: none;
    }
    .search-result a {
        color: #0000ee;
        text-decoration: underline;
    }
    .search-result a:hover {
        color: #dd0000;
    }
    .nav {
        background-color: #333;
        height: 40px;
        line-height: 40px;
        padding: 0 20px;
    }
    .nav a {
        color: white;
        text-decoration: none;
        margin-right: 25px;
        font-size: 15px;
    }
    .nav a:hover, .nav a.active {
        color: #ffd700;
        text-decoration: underline;
        font-weight: bold;
    }
    .content {
        padding: 20px;
    }
    .content-title {
        color: #4a7ba7;
        border-bottom: 2px solid #eeeeee;
        padding-bottom: 10px;
        margin-bottom: 20px;
        font-size: 22px;
    }
    .evacuation-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        background-color: #f5f5f5;
        padding: 20px;
        border: 1px solid #dddddd;
        box-shadow: 2px 2px 3px #eeeeee;
    }
    .evacuation-img {
        max-width: 800px;
        width: 100%;
        border: 1px solid #cccccc;
        box-shadow: 3px 3px 5px #eeeeee;
    }
    .notice-text {
        width: 800px;
        line-height: 1.8;
        font-size: 16px;
        text-indent: 2em;
        color: #333;
    }
    .notice-text .title {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #c0392b;
        margin-bottom: 15px;
        text-indent: 0;
    }
    .notice-text .signature {
        text-align: right;
        margin-top: 20px;
        text-indent: 0;
    }
    .footer {
        background-color: #333;
        color: #cccccc;
        text-align: center;
        padding: 15px;
        font-size: 12px;
        border-top: 3px solid #c0392b;
    }
    .footer p {
        margin: 5px 0;
    }
</style>
<body>
    <div class="container">
        <div class="header">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索...">
                <button class="search-btn" id="searchBtn">搜索</button>
            </div>
            <h1>洋栖中学</h1>
            <p>博学笃行 · 明德致远</p>
        </div>

        <!-- 搜索结果区 -->
        <div class="search-result" id="searchResult"></div>

        <div class="nav">
            <a href="yangqi.html">首页</a>
            <a href="appliance.html" >违规电器 相关信息</a>
        </div>
        
        <div class="content">
            <h2 class="content-title">消防疏散示意图</h2>
            <div class="evacuation-box">
                <!-- 消防疏散图（替换为实际图片路径） -->
                <img src="fire-evacuation-map.jpg" alt="洋栖中学消防疏散示意图" class="evacuation-img">
                <!-- 通知文字 -->
                <div class="notice-text">
                    <p class="title">关于张贴各楼层消防疏散示意图的通知</p>
                    <p>全校师生：</p>
                    <p>为保障火灾等紧急情况下的安全疏散，学校自2006年10月20日起，在各楼层醒目位置张贴消防疏散示意图，标注安全出口、疏散路线及消防设施位置。</p>
                    <p>请全体师生熟悉疏散路线，爱护示意图及消防设施，积极配合消防演练。</p>
                    <p class="signature">湘水市洋栖中学安保部<br>2006年10月20日</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>版权所有 © 1988-2008 洋栖中学 保留所有权利</p>
            <p>技术支持：洋栖中学信息技术组</p>
        </div>
    </div>

    <!-- 搜索功能（和原有页面统一） -->
    <script src="puzzle-keywords.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResult = document.getElementById('searchResult');

        function doSearch() {
            const keyword = searchInput.value.trim().toLowerCase();
            searchInput.value = '';
            searchResult.style.display = 'none';

            if (!keyword) {
                searchResult.innerHTML = '请输入搜索关键词！';
                searchResult.style.display = 'block';
                return;
            }

            let matchedUrl = '';
            let matchedKey = '';
            for (const key in puzzleKeywords) {
                if (key.toLowerCase() === keyword) {
                    matchedUrl = puzzleKeywords[key];
                    matchedKey = key;
                    break;
                }
            }

            if (matchedUrl) {
                searchResult.innerHTML = `搜索结果：<a href="${matchedUrl}" target="_blank">${matchedKey}</a>`;
            } else {
                searchResult.innerHTML = '未找到相关结果，请尝试其他关键词。';
            }
            searchResult.style.display = 'block';
        }

        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        });
    </script>
</body>
</html>
